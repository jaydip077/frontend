what is operator in javascript?
    OPERATOR is used to operate some action i.e addition|sub|mul|div|comparison etc.

Types of operator.

1)Arithmetic operator
    example: + | - | * | / | % | ++ | --

2)comparison operator
    example: == | === | != | !== | > | < | >= | <=

3)assignment Operator
    example: = | += | -= | *= | /= | %= | ++ | --

4)logical operator
    example: && | || | !
    
5)turnary operator or conditional operator
    example: condition ? true , : false

6)increment and decrement operator
    example: ++ | --

7)bitwise operator
    example: &(and) | |(or) | ^(xor) | ~(not) | <<() | >>()

8)comma operator
    example: ,

9)bigint operator
    example: 874652873465287347n;

10)string operator
    example: + (concatenation)

    -->
